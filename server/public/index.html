<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timelog Sync Server</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    header p  { font-size: 13px; color: #888; margin-top: 2px; }

    .badge {
      display: inline-block;
      background: #1c3a2a;
      color: #4ade80;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0.3px;
    }

    #swagger-ui {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px 64px;
    }

    /* Swagger dark theme overrides */
    .swagger-ui { color: #f0f0f0; }
    .swagger-ui .opblock-tag { color: #f0f0f0; border-color: #2a2a2a; }
    .swagger-ui .opblock { border-color: #2a2a2a; background: #1a1a1a; }
    .swagger-ui .opblock .opblock-summary-description { color: #aaa; }
    .swagger-ui .opblock-description-wrapper p,
    .swagger-ui .opblock-external-docs-wrapper p,
    .swagger-ui .opblock-title_normal p { color: #ccc; }
    .swagger-ui .tab li { color: #aaa; }
    .swagger-ui .info .title { color: #f0f0f0; }
    .swagger-ui .info p, .swagger-ui .info li { color: #aaa; }
    .swagger-ui section.models { border-color: #2a2a2a; background: #1a1a1a; }
    .swagger-ui section.models h4 { color: #f0f0f0; }
    .swagger-ui .model-box { background: #111; }
    .swagger-ui .model { color: #ccc; }
    .swagger-ui textarea { background: #111; color: #f0f0f0; border-color: #333; }
    .swagger-ui input[type=text] { background: #111; color: #f0f0f0; border-color: #333; }
    .swagger-ui .btn { border-color: #444; color: #f0f0f0; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .scheme-container { background: #1a1a1a; box-shadow: none; border-bottom: 1px solid #2a2a2a; }
    .swagger-ui select { background: #111; color: #f0f0f0; border-color: #333; }
    .swagger-ui .response-col_status { color: #f0f0f0; }
    .swagger-ui table thead tr th { color: #aaa; border-color: #2a2a2a; }
    .swagger-ui .parameters-col_description input { background: #111; color: #f0f0f0; }
    .swagger-ui .highlight-code .microlight { background: #111 !important; }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="#1c3a2a"/>
    <circle cx="18" cy="18" r="8" stroke="#4ade80" stroke-width="2"/>
    <line x1="18" y1="11" x2="18" y2="18" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="23" y2="21" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>Timelog Sync Server <span class="badge">v1.0</span></h1>
    <p>MongoDB sync middleware for Timelog iOS &amp; macOS</p>
  </div>
</header>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script>
const spec = {
  openapi: "3.0.0",
  info: {
    title: "Timelog Sync API",
    version: "1.0.0",
    description: "Middleware that exposes MongoDB Atlas data to Timelog iOS & macOS apps via simple HTTP endpoints. All requests require the `X-API-Key` header."
  },
  servers: [{ url: "" }],
  components: {
    securitySchemes: {
      ApiKey: { type: "apiKey", in: "header", name: "X-API-Key" }
    },
    schemas: {
      Client: {
        type: "object",
        properties: {
          _id:        { type: "string", example: "64a1f2..." },
          name:       { type: "string", example: "Acme Corp" },
          colorHex:   { type: "string", example: "#FF5733" },
          isArchived: { type: "boolean", example: false }
        }
      },
      Project: {
        type: "object",
        properties: {
          _id:           { type: "string" },
          name:          { type: "string", example: "Website Redesign" },
          code:          { type: "string", example: "WEB-01", nullable: true },
          isArchived:    { type: "boolean" },
          clientMongoId: { type: "string", nullable: true }
        }
      },
      TimeEntry: {
        type: "object",
        properties: {
          _id:             { type: "string" },
          date:            { type: "string", format: "date-time" },
          durationMinutes: { type: "integer", example: 90 },
          notes:           { type: "string", nullable: true },
          clientMongoId:   { type: "string", nullable: true },
          projectMongoId:  { type: "string", nullable: true }
        }
      },
      PullResponse: {
        type: "object",
        properties: {
          clients:  { type: "array", items: { "$ref": "#/components/schemas/Client" } },
          projects: { type: "array", items: { "$ref": "#/components/schemas/Project" } },
          entries:  { type: "array", items: { "$ref": "#/components/schemas/TimeEntry" } }
        }
      },
      SyncPayload: {
        type: "object",
        properties: {
          clients:  { type: "array", items: { "$ref": "#/components/schemas/Client" } },
          projects: { type: "array", items: { "$ref": "#/components/schemas/Project" } },
          entries:  { type: "array", items: { "$ref": "#/components/schemas/TimeEntry" } }
        }
      }
    }
  },
  security: [{ ApiKey: [] }],
  paths: {
    "/api/pull": {
      get: {
        summary: "Pull all data",
        description: "Returns all clients, projects and time entries from MongoDB in a single request. Called by the app on launch.",
        tags: ["Sync"],
        responses: {
          "200": {
            description: "All collections",
            content: { "application/json": { schema: { "$ref": "#/components/schemas/PullResponse" } } }
          },
          "401": { description: "Invalid or missing API key" }
        }
      }
    },
    "/api/sync": {
      post: {
        summary: "Push (bulk upsert) all data",
        description: "Upserts all clients, projects and time entries to MongoDB. Called automatically after local changes with a 2s debounce.",
        tags: ["Sync"],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { "$ref": "#/components/schemas/SyncPayload" } } }
        },
        responses: {
          "200": {
            description: "Sync successful",
            content: { "application/json": { schema: { type: "object", properties: { ok: { type: "boolean" } } } } }
          },
          "401": { description: "Invalid or missing API key" }
        }
      }
    }
  }
};

SwaggerUIBundle({
  spec,
  dom_id: "#swagger-ui",
  presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
  layout: "BaseLayout",
  defaultModelsExpandDepth: 1,
  defaultModelExpandDepth: 1,
  displayRequestDuration: true,
  tryItOutEnabled: true,
});
</script>
</body>
</html>
