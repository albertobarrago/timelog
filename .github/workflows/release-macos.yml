name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace TimeLog.xcworkspace \
            -scheme TimelogMac

      - name: Build
        run: |
          xcodebuild clean build \
            -workspace TimeLog.xcworkspace \
            -scheme TimelogMac \
            -configuration Release \
            -derivedDataPath build \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          # Explicit path: Sparkle ships a nested Updater.app that a bare
          # `find -name "*.app"` can match instead of the real app
          APP_PATH="build/Build/Products/Release/Timelog.app"
          test -d "$APP_PATH"
          # Ad-hoc sign: generate_appcast rejects apps that fail Apple
          # code signing checks; an ad-hoc seal is enough (no Developer ID)
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          create-dmg \
            --volname "Timelog ${{ steps.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "Timelog-${{ steps.version.outputs.version }}.dmg" \
            "$APP_PATH"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" 2>/dev/null || echo "")
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          else
            git log "${PREV_TAG}..${{ steps.version.outputs.tag }}" --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}" >> release_notes.md

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=2.9.3
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xJf sparkle.tar.xz -C sparkle-tools

      - name: Generate signed appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p appcast-work
          cp "Timelog-${VERSION}.dmg" appcast-work/
          # HTML fragment with the same basename as the DMG so
          # generate_appcast embeds it as release notes
          {
            echo "<h2>What's Changed</h2><ul>"
            tail -n +3 release_notes.md | grep '^- ' \
              | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' \
                    -e 's/^- \(.*\)$/<li>\1<\/li>/'
            echo "</ul>"
          } > "appcast-work/Timelog-${VERSION}.html"
          echo "$SPARKLE_ED_PRIVATE_KEY" | ./sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${TAG}/" \
            --link "https://github.com/${{ github.repository }}" \
            --embed-release-notes \
            --maximum-versions 1 \
            -o appcast.xml \
            appcast-work
          cat appcast.xml

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, uploading appcast only"
            gh release upload "$TAG" appcast.xml --clobber
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file release_notes.md \
              "Timelog-${{ steps.version.outputs.version }}.dmg" \
              appcast.xml
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
